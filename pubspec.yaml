name: kinsaep_pos
description: "Kinsaep POS - ระบบจุดขายมืออาชีพสำหรับทุกธุรกิจ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.6.1
  # Navigation
  go_router: ^14.8.1
  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1
  cached_network_image: ^3.4.1
  # Database
  sqflite: ^2.4.2
  path: ^1.9.0
  path_provider: ^2.1.5
  # Utilities
  uuid: ^4.5.3
  intl: ^0.19.0
  crypto: ^3.0.6
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  # Printing
  esc_pos_utils: ^1.1.0
  # Icons
  flutter_svg: ^2.0.17
  mobile_scanner: ^7.2.0
  http: ^1.6.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
